# 配置优先级2
# 当前vllm-deploy/ 的全部配置文件如下（按照配置生效优先级排序）：
# .env
# config/models.yaml
# config/vllm.yaml

# 模型预设配置
presets:
  # ==================== 通义千问 2.5 系列 ====================

  # Qwen2.5 7B 基础模型
  qwen2.5-7b:
    path: "./models/Qwen2.5-7B-Instruct"
    served_model_name: "qwen2.5-7b-instruct"
    dtype: "float16"
    max_model_len: 32768
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.85
    max_num_seqs: 32
    max_num_batched_tokens: 32768
    enable_prefix_caching: true
    multimodal: false
    description: "Qwen2.5 7B 指令模型，适合通用对话"

  # Qwen2.5 14B 模型
  qwen2.5-14b:
    path: "./models/Qwen2.5-14B-Instruct"
    served_model_name: "qwen2.5-14b-instruct"
    dtype: "bfloat16"
    max_model_len: 32768
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.85
    max_num_seqs: 24
    max_num_batched_tokens: 24576
    enable_prefix_caching: true
    multimodal: false
    description: "Qwen2.5 14B 指令模型，平衡性能与效果"

  # Qwen2.5 14B AWQ 模型
  qwen2.5-14b-awq:
    path: "./models/Qwen2.5-14B-Instruct-AWQ"
    served_model_name: "qwen2.5-14b-instruct-awq"
    dtype: "half"
    quantization: "awq"
    max_model_len: 32768
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.85
    max_num_seqs: 32
    max_num_batched_tokens: 24576
    enable_prefix_caching: true
    multimodal: false
    description: "Qwen2.5 14B AWQ 指令模型，适合单卡高吞吐文本任务"

  # Qwen2.5 72B 模型
  qwen2.5-72b:
    path: "./models/Qwen2.5-72B-Instruct"
    served_model_name: "qwen2.5-72b-instruct"
    dtype: "bfloat16"
    max_model_len: 32768
    tensor_parallel_size: 4
    gpu_memory_utilization: 0.85
    max_num_seqs: 16
    max_num_batched_tokens: 16384
    enable_prefix_caching: true
    multimodal: false
    description: "Qwen2.5 72B 指令模型，高性能高精度"

  # ==================== 通义千问 2.5 视觉语言模型 ====================

  # Qwen2.5-VL 7B 多模态模型（VL 权重 + 视觉侧占显存大，单卡 16GB 级往往无法同时 32K 上下文，默认 8K；更大显存可调高 max_model_len）
  qwen2.5-vl-7b:
    path: "./models/Qwen2.5-VL-7B-Instruct"
    served_model_name: "qwen2.5-vl-7b-instruct"
    dtype: "float16"
    max_model_len: 8192
    enforce_eager: true
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.92
    max_num_seqs: 8
    max_num_batched_tokens: 8192
    enable_prefix_caching: true
    multimodal:
      enabled: true
      limit_images: 4
      limit_videos: 1
      media_paths:
        - "./images"
        - "./videos"
    description: "Qwen2.5-VL 7B 多模态模型，支持图像和视频理解"

  # Qwen2.5-VL 32B 多模态模型
  qwen2.5-vl-32b:
    path: "./models/Qwen2.5-VL-32B-Instruct"
    served_model_name: "qwen2.5-vl-32b-instruct"
    dtype: "bfloat16"
    max_model_len: 16384
    # enforce_eager: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.8
    max_num_seqs: 8
    max_num_batched_tokens: 12288
    enable_prefix_caching: true
    attention-backend: flash_attn
    default-chat-template-kwargs:
      enable_thinking: false
    multimodal:
      enabled: true
      limit_images: 4
      limit_videos: 1
      media_paths:
        - "./images"
        - "./videos"
    description: "Qwen2.5-VL 32B 多模态模型，更强的视觉理解能力"

  # Qwen2.5-VL 32B AWQ 多模态模型
  qwen2.5-vl-32b-awq:
    path: "./models/Qwen2.5-VL-32B-Instruct-AWQ"
    served_model_name: "qwen2.5-vl-32b-instruct-awq"
    dtype: "half"
    quantization: "awq"
    max_model_len: 16384
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.8
    max_num_seqs: 8
    max_num_batched_tokens: 12288
    enable_prefix_caching: true
    attention-backend: flash_attn
    default-chat-template-kwargs:
      enable_thinking: false
    multimodal:
      enabled: true
      limit_images: 4
      limit_videos: 1
      media_paths:
        - "./images"
        - "./videos"
    description: "Qwen2.5-VL 32B AWQ 多模态模型，兼顾效果与显存占用"

  # ==================== 通义千问 3 视觉语言模型 ====================

  # Qwen3-VL 32B 多模态模型
  qwen3-vl-32b:
    path: "./models/Qwen3-VL-32B-Instruct"
    served_model_name: "qwen3-vl-32b-instruct"
    dtype: "bfloat16"
    max_model_len: 8192
    enforce_eager: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.92
    max_num_seqs: 8
    max_num_batched_tokens: 8192
    enable_prefix_caching: true
    multimodal:
      enabled: true
      limit_images: 4
      limit_videos: 2
      media_paths:
        - "./images"
        - "./videos"
    description: "Qwen3-VL 32B 多模态模型，最新的视觉语言能力"

  # Qwen3.5 27B 原生多模态模型
#  qwen3-27b:
#    path: "./models/Qwen3.5-27B"
#    served_model_name: "qwen3.5-27b"
#    dtype: "bfloat16"
#    # 两张 64GB 显卡下，提升多轮长上下文能力；并发适当收敛以平衡显存占用
#    max_model_len: 16384
#    enforce_eager: true
#    tensor_parallel_size: 2
#    gpu_memory_utilization: 0.88
#    max_num_seqs: 4
#    max_num_batched_tokens: 12288
#    enable_prefix_caching: true
#    multimodal:
#      enabled: true
#      limit_images: 4
#      limit_videos: 1
#      media_paths:
#        - "./images"
#        - "./videos"
#    description: "Qwen3.5 27B 原生多模态模型，支持图像理解与多轮对话"

  # Qwen3.5 27B 原生多模态模型
  qwen3-27b:
    path: "./models/Qwen3.5-27B"
    served_model_name: "qwen3.5-27b"
    dtype: "half"
    # 两张 64GB 显卡下，提升多轮长上下文能力；并发适当收敛以平衡显存占用
    max_model_len: 16384
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.8
    max_num_seqs: 128
    max_num_batched_tokens: 12288
    enable_prefix_caching: true
    attention-backend: flash_attn
    default-chat-template-kwargs:
      enable_thinking: false
    multimodal:
      enabled: true
      limit_images: 4
      limit_videos: 1
      media_paths:
        - "./images"
        - "./videos"
    description: "Qwen3.5 27B 原生多模态模型，支持图像理解与多轮对话"

  # ==================== 额外常用模型 ====================

  # Llama 3 8B
  llama3-8b:
    path: "./models/Meta-Llama-3-8B-Instruct"
    served_model_name: "llama3-8b-instruct"
    dtype: "bfloat16"
    max_model_len: 8192
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.85
    max_num_seqs: 32
    max_num_batched_tokens: 32768
    enable_prefix_caching: true
    multimodal: false
    description: "Meta Llama 3 8B 指令模型"

  # Llama 3 70B
  llama3-70b:
    path: "./models/Meta-Llama-3-70B-Instruct"
    served_model_name: "llama3-70b-instruct"
    dtype: "bfloat16"
    max_model_len: 8192
    tensor_parallel_size: 4
    gpu_memory_utilization: 0.85
    max_num_seqs: 16
    max_num_batched_tokens: 16384
    enable_prefix_caching: true
    multimodal: false
    description: "Meta Llama 3 70B 指令模型"

  # DeepSeek V2 Lite
  deepseek-v2-lite:
    path: "./models/DeepSeek-V2-Lite-Chat"
    served_model_name: "deepseek-v2-lite-chat"
    dtype: "bfloat16"
    max_model_len: 16384
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.85
    max_num_seqs: 16
    max_num_batched_tokens: 16384
    enable_prefix_caching: true
    multimodal: false
    description: "DeepSeek V2 Lite 对话模型"

# 当前使用的模型预设
active: "qwen2.5-vl-7b"