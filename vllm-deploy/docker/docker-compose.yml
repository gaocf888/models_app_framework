version: '3.8'

services:
  vllm:
    image: ${VLLM_IMAGE:-vllm-service:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-nvidia/cuda:12.3.0-runtime-ubuntu22.04}
        VLLM_REQUIREMENTS_PROFILE: ${VLLM_REQUIREMENTS_PROFILE:-full}
    container_name: vllm-service
    restart: unless-stopped
    command: ["python3", "/workspace/scripts/start.py", "start"]
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${MODEL_PATH:-/aidata/models/llm}:/workspace/models:ro
      - ../config:/workspace/config:ro
      - ../scripts:/workspace/scripts:ro
      - ../logs:/workspace/logs
      - ${MEDIA_PATH:-./media}:/workspace/media:ro
    environment:
      - MODEL_PRESET=${MODEL_PRESET:-qwen2.5-vl-7b}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TENSOR_PARALLEL_SIZE=${TENSOR_PARALLEL_SIZE:-1}
      - STARTUP_WAIT_TIMEOUT=${STARTUP_WAIT_TIMEOUT:-1200}
      - PATH=/opt/conda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - WORKSPACE=/workspace
    healthcheck:
      test: ["CMD", "python3", "/workspace/scripts/health.py"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - vllm-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - vllm-network
    profiles:
      - monitoring

networks:
  vllm-network:
    driver: bridge

volumes:
  prometheus-data:
