services:
  mineru-api:
    build:
      context: .
      dockerfile: Dockerfile.cpu
      args:
        MINERU_PIP_SPEC: ${MINERU_CPU_PIP_SPEC:-mineru[core]}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    image: ${MINERU_CPU_IMAGE:-mineru-cpu:py311}
    container_name: ${MINERU_CONTAINER_NAME:-mineru-api}
    restart: unless-stopped
    ports:
      - "${MINERU_PORT:-8009}:8000"
    environment:
      - MINERU_DEVICE_MODE=cpu
      - MINERU_MODEL_SOURCE=${MINERU_MODEL_SOURCE:-huggingface}
      - MINERU_API_OUTPUT_ROOT=/io/mineru-output
      - HF_HOME=/io/.hf_cache
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    volumes:
      - ${MINERU_MODELS_HOST_PATH}:/models:ro
      - ${MINERU_IO_HOST_PATH}:/io
    command: ["mineru-api", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - mineru-net
    cpus: ${MINERU_CPU_LIMIT:-4.0}
    mem_limit: ${MINERU_MEM_LIMIT:-16g}

networks:
  mineru-net:
    name: ${MINERU_NETWORK_NAME:-mineru-stack}
    driver: bridge

