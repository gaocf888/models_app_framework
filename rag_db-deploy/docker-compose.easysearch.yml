services:
  easysearch:
    image: ${EASYSEARCH_IMAGE}
    container_name: ${EASYSEARCH_CONTAINER_NAME}
    environment:
      - cluster.name=${EASYSEARCH_CLUSTER_NAME}
      - node.name=${EASYSEARCH_NODE_NAME}
      # - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=${EASYSEARCH_JAVA_OPTS}
      # - xpack.security.enabled=true
      # - security.enabled=true
      - ELASTIC_USERNAME=${EASYSEARCH_USERNAME}
      - ELASTIC_PASSWORD=${EASYSEARCH_PASSWORD}
      # init 脚本使用的连接参数（避免默认 elastic/changeme 反复认证失败日志）
      - ES_USER=${EASYSEARCH_USERNAME}
      - ES_PASS=${EASYSEARCH_PASSWORD}
      # 首次初始化可显式指定管理员密码（仅首次生效）
      # - EASYSEARCH_INITIAL_ADMIN_PASSWORD=${EASYSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${EASYSEARCH_DATA_VOLUME}:/app/easysearch/data
      # 不挂载 easysearch.yml：使用镜像默认配置与证书，避免宿主机 yml 与容器内 TLS 文件不一致导致反复启动失败。
      # 若需自定义：再增加挂载行，并须同时持久化同目录的 instance.crt / instance.key / ca.crt 等。
      # - ./easysearch/config/easysearch.yml:/app/easysearch/config/easysearch.yml:ro
      - ./easysearch/init:/opt/easysearch/init:ro
    ports:
      - "${EASYSEARCH_PORT}:9200"
    networks:
      - ${EASYSEARCH_NETWORK}
    healthcheck:
      test: [ "CMD-SHELL", "curl -s -k -u ${EASYSEARCH_USERNAME}:${EASYSEARCH_PASSWORD} https://127.0.0.1:9200/_cluster/health >/dev/null || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  rag_easysearch_data:
    name: ${EASYSEARCH_DATA_VOLUME}

networks:
  ai-stack:
    name: ${EASYSEARCH_NETWORK}
    driver: bridge
