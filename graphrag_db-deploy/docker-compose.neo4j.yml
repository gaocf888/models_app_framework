version: "3.8"

services:
  neo4j:
    image: ${NEO4J_IMAGE}
    container_name: ${NEO4J_CONTAINER_NAME}
    hostname: ${NEO4J_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      # 账号与密码，首次启动创建；后续修改需参考官方 reset 流程
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      # 监听与对外宣告地址
      - NEO4J_dbms_default__listen__address=0.0.0.0
      - NEO4J_dbms_default__advertised__address=${NEO4J_ADVERTISED_HOST}
      # 默认数据库名称，与 app/core/config.py 中 NEO4J_DATABASE 一致
      - NEO4J_dbms_default__database=${NEO4J_DATABASE}
      # 如需启用 APOC、Bloom 等插件，可按需在此处添加 NEO4JLABS_PLUGINS/NEO4J_AUTH 等配置
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    volumes:
      # /data：图数据；/logs：日志；/conf：配置；/plugins：插件
      - ${NEO4J_DATA_VOLUME}:/data
      - ./logs:/logs
      - ./conf:/conf
      - ./plugins:/plugins
    networks:
      - ${NEO4J_NETWORK}
    healthcheck:
      # 简单 HTTP 健康检查：Neo4j 启动后会在 7474 暴露管理接口
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

networks:
  graph-stack:
    name: ${NEO4J_NETWORK}
    driver: bridge

volumes:
  graph_neo4j_data:
    name: ${NEO4J_DATA_VOLUME}

