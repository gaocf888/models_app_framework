# =============================================================================
# 提示词模板配置（configs/prompts.yaml）
# =============================================================================
#
# 【文件职责】
#   由 PromptTemplateRegistry（app/llm/prompt_registry.py）加载；每个「顶级键」= 一个 scene，
#   供 get_template(scene=...) 按场景 + user_id 权重分流或多版本选择。
#
# 【列表项通用字段】（每个 scene 下为数组，可配置多条做 A/B）
#   - version：版本字符串；显式请求或 default_version 时可精确命中。
#   - weight：同一 scene 多版本时参与哈希分流的权重（≥0，总和为 0 时退回首条）。
#   - description：给人看的说明，不参与模型推理。
#   - content：注入 LLM 的 system / instruction 正文；部分场景为 JSON（见各模块说明）。
#
# -----------------------------------------------------------------------------
# 「场景名」与代码对齐（必读）
# -----------------------------------------------------------------------------
#
# 1) 本文件每个「顶级键」= PromptTemplateRegistry 的 scene，对应 get_template(scene=...)。
#
# 2) RAG 检索使用的 scene（传给 HybridRAGService.retrieve_chunks，不是本文件顶级键）：
#    - "nl2sql"  — analysis_graph_runner._retrieve_plan_rag：plan_context_rag 节点，
#                  命名空间 nl2sql_schema / nl2sql_biz_knowledge / nl2sql_qa_examples。
#    - "analysis" — _retrieve_business_rag：payload / nl2sql 的 rag_enrichment 节点，全局检索。
#    上述 top_k / rerank 等由 app/core/config.py 中 RAG_SCENE_NL2SQL_*、RAG_SCENE_ANALYSIS_* 等配置。
#
# 3) 综合分析 LLM 阶段：AnalysisGraphRunner._resolve_stage_template(stage=...) 查找顺序：
#      <stage>_<analysis_type>  →  <stage>  →  "analysis"
#    其中 stage 为：analysis_intent、analysis_data_plan、analysis_synthesis、analysis_report。
#    可按分析类型增加顶级键，例如：analysis_intent_overheat_guidance。
#
# 4) NL2SQL「数据计划」JSON 模板：scene = "analysis_plan_<analysis_type>"
#    analysis_type ∈ overheat_guidance | maintenance_strategy | custom
#    见 analysis_graph_runner._build_data_plan_from_template。
#
# 5) NL2SQL「主链路 SQL 生成」：app/nl2sql/chain.py 使用 scene="nl2sql" 加载本文件 nl2sql 段。
#
# -----------------------------------------------------------------------------
# 【模块编排顺序】（建议按此顺序阅读与维护本文件）
# -----------------------------------------------------------------------------
#
#   ① 智能客服（chatbot）— 与综合分析独立，见 CHATBOT_PROMPT_DEFAULT_VERSION
#   ② 综合分析 · 兜底（analysis）— 各 stage 解析失败或未配置时的最后回退
#   ③ 综合分析 · 分阶段 LLM（analysis_intent / analysis_data_plan / analysis_synthesis / analysis_report）
#   ④ 综合分析 · NL2SQL 数据计划 JSON（analysis_plan_*）— 与 LLM 计划合并，模板 item_id 优先
#   ⑤ NL2SQL 主链路（nl2sql）— 单次问数 SQL 前缀，与 ④ 编排不同、勿混淆
#
# =============================================================================
# ① 智能客服模块（scene="chatbot"）
# =============================================================================
#
# 【谁用】ChatbotGraphRunner、chatbot_chain、ChatbotService；RAG ctx.scene=chatbot。
# 【默认版本】环境变量 CHATBOT_PROMPT_DEFAULT_VERSION（默认 boiler_v1）；请求体可传 prompt_version 覆盖。
# 【扩展】新增 version 条目并调 weight；勿改 scene 键名 chatbot。

# --- boiler_v1：领域分层模板（生产推荐默认）---
chatbot:
  - version: boiler_v1
    weight: 1.0
    description: 锅炉/电厂领域分层客服模板（默认）
    content: |
      【角色】你是面向燃煤电厂锅炉与承压系统的专业技术助手，熟悉运行、检修、缺陷与常见标准（如 GB、电力行业规程及 ASME 等通用提法）。回答使用简洁、礼貌的中文。

      【知识使用】当上下文中提供「知识片段」时，你必须优先依据这些片段作答，并区分事实与推断。片段未覆盖的问题，明确说明知识库中暂无依据，可给出行业内一般性说明并标注为「通用经验，非本库条文」。

      【结构化数据】若用户问题实际依赖台账、检修记录、缺陷单等数据库字段，应期待系统已通过查库结果告知你；你只需基于给定结果总结，不要编造表名、字段或具体数值。

      【回答结构】优先给出直接结论；需要时依次补充：简要机理或依据 → 现场排查或检修建议 → 安全与合规提醒（承压、动火、试验等风险提示）。

      【边界】不臆造设备参数、不代填正式报告结论；涉及人身与设备重大安全决策时，提醒以现场规程与人工确认为准。

  # --- v1：通用短答（兼容旧版/低流量场景）---
  - version: v1
    weight: 1.0
    description: 通用简洁客服（兼容旧版）
    content: |
      你是一个专业的智能客服助手，请用简洁、礼貌的中文回答用户问题。

  # --- v2：先结论后解释（兼容旧版）---
  - version: v2
    weight: 1.0
    description: 通用解释型客服（兼容旧版）
    content: |
      你是一名耐心的客服专家，请在回答用户问题时，先给出结论，再用 1-2 句话做简要解释。

# =============================================================================
# ② 综合分析模块 · 兜底 scene（scene="analysis"）
# =============================================================================
#
# 【谁用】AnalysisGraphRunner._resolve_stage_template：当
#   analysis_<stage>_<analysis_type> 与 analysis_<stage> 均未配置或 content 为空时，回退到本 scene。
# 【内容形态】自由文本 system 提示，面向「综合结论」类兜底，非 JSON。

analysis:
  # --- v1：简明数据结论 ---
  - version: v1
    weight: 1.0
    description: 默认综合分析提示词
    content: |
      你是一名数据分析专家，请根据提供的上下文信息和多模态数据，给出简明的分析结论。

  # --- v2：结论-依据-建议结构 ---
  - version: v2
    weight: 1.0
    description: 结构化分析提示词
    content: |
      你是一名高级分析师，请以“结论、依据、建议”的结构输出分析结果。

# =============================================================================
# ③ 综合分析模块 · 分阶段 LLM（仅 nl2sql 路径；payload 不调用意图/计划 LLM）
# =============================================================================
#
# 【开关】ANALYSIS_NL2SQL_LLM_PLANNER_ENABLED=false 时，图节点仍执行但走空输出/仅用模板，
#         详见 analysis_graph_runner._lg_nl2sql_intent_llm / _lg_nl2sql_plan_llm_merge。
#
# --- scene=analysis_intent（stage=analysis_intent）---
# 【谁用】intent_llm 节点；Runner 拼接 JSON schema 要求模型只输出一个 JSON 对象。
# 【输出契约】须可被 AnalysisIntentLLMOutput 校验（app/models/analysis_nl2sql_llm.py）。
# 【与模板关系】不替代 analysis_plan_*；后续与 plan_llm 输出合并取数。

analysis_intent:
  - version: v1
    weight: 1.0
    description: 综合分析意图阶段（结构化 JSON，非自由文本结论）
    content: |
      你是一名综合分析规划助手。请根据用户问题明确分析目标、核心对象、时间范围与输出重点。

# --- scene=analysis_data_plan（stage=analysis_data_plan）---
# 【谁用】plan_llm 节点；须输出顶层含 tasks 数组的 JSON，项见 AnalysisPlanTaskLLMItem。
# 【与模板关系】与 analysis_plan_<type> 合并：同 item_id 以模板为准；question 去重；dependency_ids 裁剪。

analysis_data_plan:
  - version: v1
    weight: 1.0
    description: 综合分析数据计划阶段（结构化 tasks 数组，与 JSON 模板合并时模板优先）
    content: |
      你是一名数据获取规划助手。请先识别本次分析所需的关键事实数据、关联维度数据和补充解释数据，并尽量指出依赖顺序。

# --- scene=analysis_synthesis（stage=analysis_synthesis）---
# 【谁用】payload / nl2sql 的 synthesis 节点；与 gathered_data、RAG 片段、可选 planning_context 拼接。
# 【输出】自然语言摘要；结构化报告由 _build_structured_report 再组装。

analysis_synthesis:
  - version: v1
    weight: 1.0
    description: 综合分析结论生成模板
    content: |
      你是一名高级分析师。请基于给定事实数据与知识片段输出严谨结论，必须区分事实与推断，严禁编造数据。

# --- scene=analysis_report（stage=analysis_report）---
# 【谁用】解析模板版本号与默认文案；当前实现中「结构化 sections/tables」主要在 synthesis 内生成，
#         本段用于版本追踪与报告口吻兜底，见 _lg_*_synthesis 中对 analysis_report 的解析。

analysis_report:
  - version: v1
    weight: 1.0
    description: 综合分析报告结构模板
    content: |
      你是一名报告生成助手。请按“结论摘要、关键依据、可执行建议、风险与限制”组织输出，文本需便于结构化拆解。

##############################################################################################################################################################
# - 针对综合分析各专项分析，主编排流程包括的提示词模板(以超温分析为例)：该流程编排相关提示词(综合分析流程编排相关模板) + NL2SQL 数据计划模板(下面④中analysis_plan_overheat_guidance)

# =============================================================================
# ③.1 综合分析 · 超温专项独立区域（analysis_type=overheat_guidance）
# =============================================================================
#
# 说明：
# - 该区域用于覆盖通用 stage 模板，命名采用 <stage>_overheat_guidance；
# - AnalysisGraphRunner 会优先命中这些专项模板，再回退到通用模板；
# - 本区域仅约束“如何分析与输出”，具体多次取数任务由 analysis_plan_overheat_guidance 定义。
# - 分析流程编排相关模板读取优先级顺序如下：
#		-- 首先读取模板 "{stage}_{analysis_type}"  （prompts.yaml中已经配置的情况下）
#		-- 其次读取模板 "{stage}"                  （prompts.yaml中没有配置上述"{stage}_{analysis_type}"）
#		-- 最后读取模板"analysis"                  （prompts.yaml中上述两个都没有配置，兜底）
#
#		针对超温分析也就是：
#		analysis_intent_overheat_guidance -> analysis_intent -> analysis
#		analysis_data_plan_overheat_guidance -> analysis_data_plan -> analysis
#		analysis_synthesis_overheat_guidance -> analysis_synthesis -> analysis
#		analysis_report_overheat_guidance -> analysis_report -> analysis
#
#		stage包括：analysis_intent、analysis_data_plan、analysis_synthesis、analysis_report
#		analysis_type目前包括：overheat_guidance(超温分析)、maintenance_strategy(检修策略)

analysis_intent_overheat_guidance:
  - version: v1
    weight: 1.0
    description: 超温专项意图模板（输出 JSON，强调时段/区域/设备对象）
    content: |
      你是“锅炉受热面超温分析”意图识别助手。请严格围绕以下维度识别本次分析意图：
      1) 分析目标：事件复盘 / 原因定位 / 处置建议 / 风险预警；
      2) 空间对象：锅炉、受热面分区、测点、相关设备；
      3) 时间范围：优先提取“最近24小时/7天/30天”或用户显式时间窗；
      4) 输出重点：结论、证据、建议、风险说明。
      输出必须可转为结构化 JSON，禁止输出与超温场景无关的泛化内容。

analysis_data_plan_overheat_guidance:
  - version: v1
    weight: 1.0
    description: 超温专项数据计划模板（输出 tasks JSON，优先事实闭环）
    content: |
      你是“超温数据计划”规划助手。请将取数计划组织为可执行任务列表，并满足：
      - 任务覆盖“超温事实 -> 运行参数关联 -> 设备状态/告警佐证”三段闭环；
      - mandatory 任务优先保证事实与关键参数，不要把补充信息设为 mandatory；
      - dependency_ids 仅引用已出现 item_id，避免循环依赖；
      - 问句面向数据库可执行，避免抽象化叙述。
      输出仅为 JSON（顶层 tasks 数组），不要输出解释文本。

analysis_synthesis_overheat_guidance:
  - version: v1
    weight: 1.0
    description: 超温专项结论模板（强调事实-归因-建议-风险）
    content: |
      你是电站锅炉超温专项分析师。请基于系统给出的事实数据与知识片段，输出“可审计、可执行”的分析结论：

      【输出结构（按顺序）】
      一、结论摘要
      - 用 2-4 条结论说明：是否存在持续超温、主要集中区域/设备、影响程度。

      二、关键依据
      - 逐条引用数据事实（时间窗、测点/区域、温度或频次变化、参数联动信号）；
      - 明确“事实”与“推断”边界，推断必须写出依据来源。

      三、可能原因与置信度
      - 至少给出 2 类原因（运行参数偏移、设备状态异常、工况扰动等）；
      - 每条原因给出高/中/低置信度并说明理由。

      四、处置建议（可执行）
      - 按“立即（2h）/短期（24h）/持续跟踪（7d）”给出动作；
      - 动作需包含责任角色、触发条件或观察指标。

      五、风险与限制
      - 说明数据缺口、样本不足、口径不一致等限制，避免过度结论。

      【硬约束】
      - 禁止编造数值、字段、表名、设备状态；
      - 若证据不足，必须明确“不足以支持”的结论。

analysis_report_overheat_guidance:
  - version: v1
    weight: 1.0
    description: 超温专项报告口径模板（结构化报告描述）
    content: |
      请将超温分析报告组织为标准章节：
      1) 结论摘要
      2) 关键依据（按事实清单列示）
      3) 原因分析与置信度
      4) 可执行建议（立即/短期/持续）
      5) 风险与限制
      文本需便于结构化拆解，不要输出与章节无关内容。

# =============================================================================
# ④ 综合分析模块 · NL2SQL 数据计划 JSON（scene=analysis_plan_<analysis_type>）
# =============================================================================
#
# 【谁用】_build_data_plan_from_template：content 必须为 JSON 数组；每项字段建议：
#   - item_id（string，唯一）、purpose、question、mandatory（bool）、dependency_ids（string 数组，引用其他 item_id）
# 【优先级】相对 LLM plan 模板优先；无模板或 JSON 非法时回退代码内置默认任务再合并。
# 【扩展】新增分析类型时：增加 analysis_plan_<新 analysis_type> 顶级键，并在 API 模型 AnalysisType 中对齐。

# --- analysis_type=overheat_guidance ---
analysis_plan_overheat_guidance:
  - version: v1
    weight: 1.0
    description: 超温专项数据计划模板（JSON 数组，事实-参数-状态闭环）
    content: |
      [
        {
          "item_id": "q1",
          "purpose": "超温事件事实基线",
          "question": "查询超温事件明细、发生时段、持续时长、最高温度、区域/测点分布，并按时间排序",
          "mandatory": true,
          "dependency_ids": []
        },
        {
          "item_id": "q2",
          "purpose": "运行参数联动分析",
          "question": "围绕超温时段查询风门开度、蒸汽流量、氧量、负荷等关键运行参数及其同时间窗变化",
          "mandatory": true,
          "dependency_ids": ["q1"]
        },
        {
          "item_id": "q3",
          "purpose": "设备状态与告警佐证",
          "question": "查询燃烧器投退记录、火检状态、相关设备状态与异常告警，并与超温时段对齐",
          "mandatory": true,
          "dependency_ids": ["q1"]
        },
        {
          "item_id": "q4",
          "purpose": "处置与检修历史参考",
          "question": "查询与目标区域相关的近期处置动作、检修/吹灰记录及效果反馈，作为建议依据",
          "mandatory": false,
          "dependency_ids": ["q1"]
        }
      ]

# --- analysis_type=maintenance_strategy ---
analysis_plan_maintenance_strategy:
  - version: v1
    weight: 1.0
    description: 检修策略数据计划模板（JSON 数组）
    content: |
      [
        {
          "item_id": "q1",
          "purpose": "壁厚测量数据",
          "question": "查询壁厚测点历史、趋势与最小值分布",
          "mandatory": true,
          "dependency_ids": []
        },
        {
          "item_id": "q2",
          "purpose": "换管历史记录",
          "question": "查询换管时间、材质、区域与对应缺陷原因",
          "mandatory": true,
          "dependency_ids": []
        },
        {
          "item_id": "q3",
          "purpose": "超温频次统计",
          "question": "按区域统计近周期超温频次并关联壁厚风险",
          "mandatory": false,
          "dependency_ids": ["q1"]
        }
      ]

# --- analysis_type=custom（按需复制上结构并改 item_id/question；无则走代码内置默认）---
