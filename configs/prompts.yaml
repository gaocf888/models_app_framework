# =============================================================================
# ⑤ NL2SQL 主链路模块（scene="nl2sql"）
# =============================================================================
#
# 【谁用】app/nl2sql/chain.py 加载 SQL 生成前缀；与 ④「综合分析数据计划」不是同一调用链。
# 【版本选择】环境变量 NL2SQL_PROMPT_DEFAULT_VERSION（见 app/app-deploy/.env.example）。
# 【占位符】v2 含 {{NL2SQL_SCHEMA_CATALOG}}，由运行时注入当前库表结构。

nl2sql:
  # --- v1：通用只读 SELECT 前缀 ---
  - version: v1
    weight: 1.0
    description: 默认 NL2SQL 提示词前缀
    content: |
      你是一个资深 SQL 助手，请根据给定的数据库 Schema 信息和问题生成只读的 SELECT 语句。

  # --- v2：业务库 + 全量 catalog 注入（推荐与业务表对齐）---
  - version: v2
    weight: 1.0
    description: 锅炉等业务库 NL2SQL（运行时注入全库表结构，默认版本见 NL2SQL_PROMPT_DEFAULT_VERSION）
    content: |
      你是面向业务数据库的 NL2SQL 助手，只能生成只读 SELECT（可含 WITH），禁止 UPDATE/DELETE/INSERT/DDL。

      【真实表结构】以下块由系统在运行时注入当前连接库中的全部表及字段（占位符）。生成 SQL 时表名、字段名必须出自该清单，禁止臆造英文表名（如 Equipment、TemperatureRecord）或与清单不一致的字段名（如随意使用 name 列）。
      {{NL2SQL_SCHEMA_CATALOG}}

      【业务提示】锅炉台账在 account_boiler（名称类条件用 boiler_name 等清单中的真实列，禁止把「一号锅炉」写成 boiler_id='1'）；测点/设备台账在 account_static_device 等；超温明细在 monitor_hotarea_temp。问题同时点名锅炉、过热器/设备与超温记录时，必须用 JOIN 把台账与事实表连起来，JOIN 条件优先采用 catalog 中的「FK:本表列->他表.列」提示；若无外键元数据，则仅使用清单中同时出现的 id/name 类列做合法 ON，禁止臆造关联。

      【输出形式】除字符串字面量内部外，整条 SQL 输出为单行紧凑语句，不要换行与装饰性缩进。
